name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: 🚀 Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - run: flutter pub get

      - name: Build APK (Split)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Build Web
        run: flutter build web --release --web-renderer canvaskit

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk rafeeq-armeabi-v7a-v${{ steps.version.outputs.VERSION }}.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk rafeeq-arm64-v8a-v${{ steps.version.outputs.VERSION }}.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk rafeeq-x86_64-v${{ steps.version.outputs.VERSION }}.apk
          mv build/app/outputs/flutter-apk/app-release.apk rafeeq-universal-v${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "رَفيِقْ v${{ steps.version.outputs.VERSION }}"
          body: |
            ## ✨ What's New in v${{ steps.version.outputs.VERSION }}
            
            ### 📱 Downloads
            - **Universal APK** - Works on all Android devices
            - **armeabi-v7a** - For older 32-bit devices
            - **arm64-v8a** - For modern 64-bit devices (recommended)
            - **x86_64** - For emulators and Chromebooks
            
            ### 🌐 Web Version
            - Access directly in your browser
            
            ---
            جزاكم الله خيراً
          files: |
            rafeeq-armeabi-v7a-v${{ steps.version.outputs.VERSION }}.apk
            rafeeq-arm64-v8a-v${{ steps.version.outputs.VERSION }}.apk
            rafeeq-x86_64-v${{ steps.version.outputs.VERSION }}.apk
            rafeeq-universal-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Web to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          destination_dir: web
