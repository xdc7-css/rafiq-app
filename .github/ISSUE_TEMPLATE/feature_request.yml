name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Feature Request
        
        We'd love to hear your ideas! Please describe the feature you'd like to see.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature relate to?
      options:
        - Quran
        - Hadith
        - Prayer Times
        - Tasbih
        - Qibla
        - Adhkar
        - Ziyarat
        - Notifications
        - UI/UX
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like
      placeholder: "A clear description of what you want to happen..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important? How would it benefit users?
      placeholder: "This feature would help..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups or Screenshots
      description: If you have visual ideas, add them here.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this feature has not been requested before.
          required: true
        - label: This feature aligns with the Islamic purpose of the app.
          required: true
