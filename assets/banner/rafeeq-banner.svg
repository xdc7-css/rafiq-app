<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.5" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#0D1F3C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="400" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9A84C"/>
      <stop offset="0.5" stop-color="#F0D078"/>
      <stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="800" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" result="blur"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <clipPath id="rounded">
      <rect width="1280" height="640" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1280" height="640" fill="url(#bg)"/>
    <rect width="1280" height="640" fill="url(#grid)"/>

    <!-- Ambient glow orbs -->
    <circle cx="200" cy="320" r="300" fill="#C9A84C" opacity="0.04" filter="url(#blur2)"/>
    <circle cx="1080" cy="200" r="250" fill="#1A3A5C" opacity="0.3" filter="url(#blur1)"/>
    <circle cx="640" cy="500" r="200" fill="#C9A84C" opacity="0.06" filter="url(#blur1)"/>

    <!-- Geometric Islamic pattern - left -->
    <g opacity="0.06" transform="translate(80, 120)">
      <path d="M0 0L30 15L60 0L60 30L90 15L90 45L60 30L60 60L90 45L120 60L120 90L90 75L90 105L120 90L150 105L150 135L120 120L120 150L150 135L180 150L180 180L150 165L150 195L180 180L210 195L210 225L180 210L180 240L210 225L240 240L240 270L210 255L210 285L240 270L270 285L270 315L240 300L240 330L270 315L300 330L300 360L270 345L270 375L300 360" stroke="#C9A84C" stroke-width="1" fill="none"/>
    </g>

    <!-- Geometric Islamic pattern - right -->
    <g opacity="0.06" transform="translate(880, 120)">
      <path d="M300 0L270 15L240 0L240 30L210 15L210 45L240 30L240 60L210 45L180 60L180 90L210 75L210 105L180 90L150 105L150 135L180 120L180 150L150 135L120 150L120 180L150 165L150 195L120 180L90 195L90 225L120 210L120 240L90 225L60 240L60 270L90 255L90 285L60 270L30 285L30 315L60 300L60 330L30 315L0 330L0 360L30 345L30 375L0 360" stroke="#C9A84C" stroke-width="1" fill="none"/>
    </g>

    <!-- Eight-pointed star motif - center top -->
    <g transform="translate(640, 80)" opacity="0.08">
      <polygon points="0,-40 10,-10 40,-10 15,10 25,40 0,20 -25,40 -15,10 -40,-10 -10,-10" fill="none" stroke="#C9A84C" stroke-width="1"/>
      <polygon points="0,-30 8,-8 30,-8 11,8 18,30 0,15 -18,30 -11,8 -30,-8 -8,-8" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    </g>

    <!-- Decorative lines -->
    <line x1="200" y1="160" x2="440" y2="160" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
    <line x1="840" y1="160" x2="1080" y2="160" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>

    <!-- Accent overlay -->
    <rect width="1280" height="640" fill="url(#accent)"/>

    <!-- Title: Arabic -->
    <text x="640" y="280" text-anchor="middle" font-family="'Arial', 'Noto Sans Arabic', sans-serif" font-size="96" font-weight="bold" fill="#F0D078" letter-spacing="8">
      رَفيِقْ
    </text>

    <!-- Subtitle: Romanized -->
    <text x="640" y="340" text-anchor="middle" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="28" font-weight="300" fill="#C9A84C" letter-spacing="12" text-transform="uppercase">
      R A F E E Q
    </text>

    <!-- Tagline -->
    <text x="640" y="390" text-anchor="middle" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="16" fill="#8A9BB5" letter-spacing="4">
      YOUR PREMIUM ISLAMIC COMPANION
    </text>

    <!-- Decorative separator -->
    <line x1="500" y1="420" x2="780" y2="420" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
    <circle cx="500" cy="420" r="3" fill="#C9A84C" opacity="0.5"/>
    <circle cx="640" cy="420" r="3" fill="#C9A84C" opacity="0.5"/>
    <circle cx="780" cy="420" r="3" fill="#C9A84C" opacity="0.5"/>

    <!-- Feature pills -->
    <g transform="translate(640, 470)" text-anchor="middle">
      <rect x="-280" y="-12" width="120" height="24" rx="12" fill="#C9A84C" opacity="0.1" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
      <text x="-220" y="4" font-family="Arial" font-size="10" fill="#C9A84C" letter-spacing="1">QURAN</text>

      <rect x="-140" y="-12" width="120" height="24" rx="12" fill="#C9A84C" opacity="0.1" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
      <text x="-80" y="4" font-family="Arial" font-size="10" fill="#C9A84C" letter-spacing="1">HADITH</text>

      <rect x="0" y="-12" width="130" height="24" rx="12" fill="#C9A84C" opacity="0.1" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
      <text x="65" y="4" font-family="Arial" font-size="10" fill="#C9A84C" letter-spacing="1">PRAYER TIMES</text>

      <rect x="140" y="-12" width="140" height="24" rx="12" fill="#C9A84C" opacity="0.1" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
      <text x="210" y="4" font-family="Arial" font-size="10" fill="#C9A84C" letter-spacing="1">WIDGETS</text>
    </g>

    <!-- Version badge -->
    <g transform="translate(1160, 560)">
      <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#0D1F3C" stroke="#C9A84C" stroke-width="0.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#C9A84C">v1.0.0</text>
    </g>

    <!-- Flutter badge -->
    <g transform="translate(1160, 590)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#0D1F3C" stroke="#54C5F8" stroke-width="0.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#54C5F8">FLUTTER</text>
    </g>

    <!-- Bottom border glow -->
    <rect x="0" y="635" width="1280" height="5" fill="url(#gold)" opacity="0.3"/>
  </g>
</svg>
