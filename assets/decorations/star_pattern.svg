<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3">
  <!-- Eight-pointed star -->
  <polygon points="100,20 115,85 180,100 115,115 100,180 85,115 20,100 85,85" />
  <!-- Inner star rotated 45deg -->
  <polygon points="100,40 110,90 160,100 110,110 100,160 90,110 40,100 90,90" />
  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="#D4AF37" />
  <!-- Radiating lines -->
  <line x1="100" y1="0" x2="100" y2="200" />
  <line x1="0" y1="100" x2="200" y2="100" />
</svg>