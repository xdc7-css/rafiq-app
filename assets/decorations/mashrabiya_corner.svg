<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none" stroke="#D4AF37" stroke-width="0.6" opacity="0.4">
  <!-- Interlocking arcs forming mashrabiya pattern -->
  <path d="M 0 50 Q 50 50 50 0" />
  <path d="M 0 100 Q 100 100 100 0" />
  <path d="M 0 150 Q 150 150 150 0" />
  <path d="M 50 150 Q 100 100 50 50" />
  <path d="M 100 150 Q 150 100 100 50" />
  <!-- Repeating smaller arcs -->
  <path d="M 0 25 Q 25 25 25 0" />
  <path d="M 25 50 Q 50 25 25 25" />
  <path d="M 50 75 Q 75 50 50 50" />
  <path d="M 75 100 Q 100 75 75 75" />
  <!-- Decorative circles -->
  <circle cx="25" cy="25" r="8" />
  <circle cx="50" cy="50" r="12" />
  <circle cx="75" cy="75" r="8" />
  <circle cx="100" cy="100" r="12" />
  <circle cx="50" cy="25" r="5" />
  <circle cx="25" cy="50" r="5" />
</svg>