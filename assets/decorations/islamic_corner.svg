<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.5">
  <!-- Outer arc -->
  <path d="M 0 0 Q 0 100 100 100 Q 200 100 200 0" />
  <path d="M 0 0 Q 0 100 100 100 Q 200 100 200 0" transform="rotate(90 100 100)" />
  <path d="M 0 0 Q 0 100 100 100 Q 200 100 200 0" transform="rotate(180 100 100)" />
  <path d="M 0 0 Q 0 100 100 100 Q 200 100 200 0" transform="rotate(270 100 100)" />
  <!-- Inner arcs -->
  <path d="M 20 20 Q 20 80 80 80 Q 140 80 140 20" />
  <path d="M 20 20 Q 20 80 80 80 Q 140 80 140 20" transform="rotate(90 100 100)" />
  <path d="M 20 20 Q 20 80 80 80 Q 140 80 140 20" transform="rotate(180 100 100)" />
  <path d="M 20 20 Q 20 80 80 80 Q 140 80 140 20" transform="rotate(270 100 100)" />
  <!-- Eight-pointed star -->
  <polygon points="100,30 110,90 170,100 110,110 100,170 90,110 30,100 90,90" />
  <!-- Center circle -->
  <circle cx="100" cy="100" r="15" />
  <!-- Diagonal lines -->
  <line x1="0" y1="0" x2="200" y2="200" />
  <line x1="200" y1="0" x2="0" y2="200" />
</svg>